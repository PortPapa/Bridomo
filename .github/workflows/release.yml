name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish LocalTrafficInspector.csproj -c Release --self-contained -r win-x64 -o ./publish

      - name: Build Installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/BridomoSetup.iss
          options: /DMyAppVersion=${{ steps.ver.outputs.version }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: "Bridomo v${{ steps.ver.outputs.version }}"
          files: installer-output/Bridomo-Setup-${{ steps.ver.outputs.version }}.exe
