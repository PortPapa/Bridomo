<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      padding: 14px;
      background: #0d1117;
      color: #e6edf3;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 12px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #30363d;
    }
    .header h3 {
      font-size: 13px;
      color: #58a6ff;
      font-weight: 600;
    }
    .header .tag {
      background: #30363d;
      color: #7d8590;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 9px;
    }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px 10px;
      border-radius: 4px;
      background: #161b22;
      border: 1px solid #30363d;
      font-size: 11px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #3fb950; }
    .dot.red { background: #f85149; }
    .dot.orange { background: #d29922; }

    /* Input */
    .input-group {
      margin-bottom: 12px;
    }
    .input-group label {
      font-size: 10px;
      color: #7d8590;
      display: block;
      margin-bottom: 4px;
    }
    .input-group input {
      width: 100%;
      padding: 6px 8px;
      background: transparent;
      border: none;
      border-bottom: 1px solid #30363d;
      color: #e6edf3;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 12px;
      outline: none;
    }
    .input-group input:focus {
      border-bottom-color: #58a6ff;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 10px;
      color: #7d8590;
    }
    .stats .val {
      color: #e6edf3;
      font-weight: 600;
    }
    .stats .val.orange { color: #f0883e; }

    /* Button */
    .btn {
      width: 100%;
      padding: 8px;
      border: 1px solid #30363d;
      border-radius: 4px;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
    }
    .btn-start {
      color: #3fb950;
      border-color: #3fb950;
    }
    .btn-start:hover {
      background: #3fb95020;
    }
    .btn-stop {
      color: #f85149;
      border-color: #f85149;
    }
    .btn-stop:hover {
      background: #f8514920;
    }

    /* Footer */
    .footer {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #30363d;
      font-size: 9px;
      color: #7d8590;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3>DOM Recorder</h3>
    <span class="tag">LTI Extension</span>
  </div>

  <div class="status" id="statusBar">
    <div class="dot red" id="statusDot"></div>
    <span id="statusText">연결 안 됨</span>
  </div>

  <div class="stats" id="statsBar" style="display:none">
    <span>events: <span class="val orange" id="eventCount">0</span></span>
    <span>clicks: <span class="val" id="clickCount">0</span></span>
    <span>inputs: <span class="val" id="inputCount">0</span></span>
  </div>

  <div class="input-group">
    <label>websocket</label>
    <input type="text" id="wsUrl" value="ws://127.0.0.1:8889">
  </div>

  <button class="btn btn-start" id="toggleBtn">Run</button>

  <div class="footer">LocalTrafficInspector</div>

  <script src="popup.js"></script>
</body>
</html>
